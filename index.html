<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expert Women Health PRO</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="toast">Збережено ✨</div>

    <div id="welcome-page" class="page active">
        <div class="card welcome-card">
            <h1>Вітаю! ✨</h1>
            <p>Ваш персональний асистент готовий до роботи.</p>
            <button class="btn" onclick="showPage('main-app')">Зайти в програмку</button>
        </div>
    </div>

    <div id="main-app" class="page">
        <div id="end-reminder" class="notification">
            ⚠️ <b>Місячні закінчилися?</b> Внесіть дату закінчення.
            <button class="btn btn-small" onclick="showPage('setup-cycle-page')">Внести дату</button>
        </div>

        <div class="card">
            <div class="circle-container">
                <svg width="160" height="160">
                    <circle class="circle-bg" cx="80" cy="80" r="70"></circle>
                    <circle id="progress-bar" class="circle-progress" cx="80" cy="80" r="70" stroke-dasharray="0 440"></circle>
                </svg>
                <div class="circle-text">
                    <div id="day-num">?</div>
                    <div class="label">день циклу</div>
                    <div id="days-left"></div>
                </div>
            </div>
            <h3 id="phase-name">Завантаження...</h3>
        </div>

        <button class="btn" onclick="showPage('profile-page')">👤 Мій Профіль & Налаштування</button>
    </div>

    <div id="profile-page" class="page">
        <div class="card">
            <h3>👤 Особисті дані</h3>
            <label>Ім'я:</label>
            <input type="text" id="user-name" class="input-field">
            <label>Ваш вік:</label>
            <input type="number" id="user-age" class="input-field">
            <label>Тривалість кровотечі (днів):</label>
            <input type="number" id="period-duration" class="input-field">
            <button class="btn" onclick="saveProfile()">Зберегти профіль</button>
        </div>
        <button class="btn btn-secondary" onclick="showPage('setup-cycle-page')">⚙️ Налаштувати цикл</button>
        <button class="btn btn-back" onclick="showPage('main-app')">Назад</button>
    </div>

    <div id="setup-cycle-page" class="page">
        <div class="card">
            <h3>🩸 Редагування циклу</h3>
            <label>Початок:</label>
            <input type="date" id="start-date" class="input-field">
            <label>Закінчення:</label>
            <input type="date" id="end-date" class="input-field">
            <div class="checkbox-group">
                <input type="checkbox" id="still-going" onchange="toggleEndInput(this)"> 
                <label for="still-going">Ще тривають ⏳</label>
            </div>
            <button class="btn" onclick="saveCycle()">Зберегти дані</button>
            <button class="btn btn-back" onclick="showPage('main-app')">Скасувати</button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/calendar.js"></script>
</body>
</html>
