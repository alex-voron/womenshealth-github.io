<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Period Tracker Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #fff; color: #333; text-align: center; padding: 20px; }
        .cycle-circle { width: 200px; height: 200px; border-radius: 50%; border: 10px solid #ff85a2; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; }
        .advice-card { background: #fff1f3; border-radius: 15px; padding: 15px; margin-top: 20px; border: 1px solid #ffc1cc; }
        .btn { background: #ff85a2; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Твій цикл</h1>
    <div class="cycle-circle" id="day-counter">День 12</div>
    <div class="advice-card">
        <h3>🩺 Порада експерта (Premium)</h3>
        <p id="advice-text">Сьогодні ідеальний день для йоги та трав'яного чаю за протоколом ACOG.</p>
    </div>
    <br>
    <button class="btn" onclick="TgMainButton()">Оновити дані</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Розгорнути на весь екран

        function TgMainButton() {
            tg.MainButton.setText("Зберегти зміни").show();
        }
    </script>
</body>
</html>
