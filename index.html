<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Women Health</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fff5f7; color: #4a4a4a; text-align: center; padding: 20px; }
        .container { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(255, 133, 162, 0.2); }
        .cycle-circle { width: 180px; height: 180px; border-radius: 50%; border: 8px solid #ff85a2; margin: 20px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; }
        .day-num { font-size: 32px; font-weight: bold; color: #ff85a2; }
        .advice-card { background: #fff1f3; border-radius: 15px; padding: 15px; margin-top: 20px; border-left: 5px solid #ff85a2; text-align: left; }
        .btn { background: #ff85a2; color: white; border: none; padding: 12px 25px; border-radius: 25px; font-size: 16px; margin-top: 20px; width: 100%; font-weight: bold; }
        input[type="date"] { padding: 10px; border-radius: 10px; border: 1px solid #ddd; margin-top: 10px; width: 80%; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Мій асистент 🩺</h2>
        
        <div id="setup-view">
            <p>Вкажіть дату початку останнього циклу:</p>
            <input type="date" id="last-period-date">
            <button class="btn" onclick="saveData()">Зберегти та розрахувати</button>
        </div>

        <div id="main-view" style="display:none;">
            <div class="cycle-circle">
                <div id="cycle-day" class="day-num">?</div>
                <div style="font-size: 14px;">день циклу</div>
            </div>
            <div class="advice-card">
                <strong>🩺 Порада експерта:</strong>
                <p id="advice-text">Завантаження персональних рекомендацій...</p>
            </div>
            <button class="btn" onclick="resetData()" style="background: #ccc;">Змінити дату</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Поради від "експертів"
        const expertTips = {
            menstrual: "Порада від доктора А. Сміта: Збільште споживання заліза (шпинат, сочевиця) для підтримки енергії.",
            follicular: "Медичний протокол: Рівень естрогену зростає. Ідеальний час для активного навчання та тренувань.",
            ovulation: "Рекомендація експертів: Ви можете відчувати піднесення сил. Пийте достатньо води (1.5-2л).",
            luteal: "Порада нутриціолога: Можлива затримка води. Обмежте сіль та додайте продукти з магнієм."
        };

        function calculateCycle() {
            const savedDate = localStorage.getItem('lastPeriod');
            if (savedDate) {
                const start = new Date(savedDate);
                const today = new Date();
                const diffTime = Math.abs(today - start);
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24)) % 28; // Беремо цикл 28 днів
                
                document.getElementById('cycle-day').innerText = diffDays + 1;
                
                // Визначаємо фазу та пораду
                let tip = "";
                if (diffDays <= 5) tip = expertTips.menstrual;
                else if (diffDays <= 13) tip = expertTips.follicular;
                else if (diffDays <= 16) tip = expertTips.ovulation;
                else tip = expertTips.luteal;
                
                document.getElementById('advice-text').innerText = tip;
                document.getElementById('setup-view').style.display = 'none';
                document.getElementById('main-view').style.display = 'block';
            }
        }

        function saveData() {
            const dateInput = document.getElementById('last-period-date').value;
            if (dateInput) {
                localStorage.setItem('lastPeriod', dateInput);
                calculateCycle();
            }
        }

        function resetData() {
            localStorage.removeItem('lastPeriod');
            document.getElementById('setup-view').style.display = 'block';
            document.getElementById('main-view').style.display = 'none';
        }

        // Запуск при завантаженні
        calculateCycle();
    </script>
</body>
</html>
